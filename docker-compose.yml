# =====================================================
# Docker Compose — Playto Payout Engine
# 
# Services:
# 1. db        — PostgreSQL database
# 2. redis     — Redis (Celery broker + result backend)
# 3. backend   — Django API server
# 4. celery    — Celery background worker
# 5. celerybeat — Celery periodic task scheduler
# 6. frontend  — React app (served by nginx)
# 
# Usage:
#   docker-compose up --build          # Start everything
#   docker-compose up --build -d       # Start in background
#   docker-compose down                # Stop everything
#   docker-compose logs -f backend     # Follow backend logs
#   docker-compose exec backend python manage.py seed_data  # Seed data
# =====================================================

version: '3.8'

services:
  # ──────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: playto_payout
      POSTGRES_USER: playto_user
      POSTGRES_PASSWORD: playto_pass_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playto_user -d playto_payout"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # Redis
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # Django Backend
  # ──────────────────────────────────────
  backend:
    build:
      context: ./backend
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DATABASE_URL=postgres://playto_user:playto_pass_123@db:5432/playto_payout
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=docker-compose-dev-secret-key-change-in-prod
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend,0.0.0.0
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:80
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Run migrations and then start the server
    command: >
      sh -c "
        echo 'Waiting for DB...' &&
        python manage.py migrate --noinput &&
        echo 'Running seed_data...' &&
        python manage.py seed_data || true &&
        echo 'Starting server...' &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload
      "
    volumes:
      # Mount source code for live reload during development
      - ./backend:/app

  # ──────────────────────────────────────
  # Celery Worker
  # ──────────────────────────────────────
  celery:
    build:
      context: ./backend
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DATABASE_URL=postgres://playto_user:playto_pass_123@db:5432/playto_payout
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=docker-compose-dev-secret-key-change-in-prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: celery -A config worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app

  # ──────────────────────────────────────
  # Celery Beat (periodic tasks)
  # ──────────────────────────────────────
  celerybeat:
    build:
      context: ./backend
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DATABASE_URL=postgres://playto_user:playto_pass_123@db:5432/playto_payout
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=docker-compose-dev-secret-key-change-in-prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: celery -A config beat --loglevel=info
    volumes:
      - ./backend:/app

  # ──────────────────────────────────────
  # React Frontend
  # ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: